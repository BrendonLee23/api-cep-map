<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>api-cep-map</title>
  <style>
    body { font-family: sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    form { display: flex; flex-direction: column; gap: .6rem; max-width: 340px; }
    label { display: flex; flex-direction: column; gap: .2rem; font-size: .9rem; }
    input { padding: .4rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: .5rem 1.2rem; font-size: 1rem; cursor: pointer; align-self: flex-start; }
    #resultado { margin-top: 1.5rem; }
    ul { columns: 3; column-gap: 1rem; list-style: disc; padding-left: 1.2rem; }
    .erro { color: #c00; }
    .info { color: #444; font-size: .9rem; }
  </style>
</head>
<body>
  <h1>Busca de CEPs por Raio</h1>
  <form id="formulario">
    <label>
      CEP de origem
      <input type="text" id="cep" maxlength="9" placeholder="00000-000" required>
    </label>
    <label>
      Raio (km)
      <input type="number" id="raioKm" min="0.1" max="500" step="any" value="5" required>
    </label>
    <button type="submit">Buscar</button>
  </form>
  <div id="resultado"></div>

  <script>
    document.getElementById('formulario').addEventListener('submit', async function(e) {
      e.preventDefault();
      var cep = document.getElementById('cep').value.replace(/\D/g, '');
      var raioKm = document.getElementById('raioKm').value;
      var el = document.getElementById('resultado');
      el.innerHTML = '<p class="info">Buscando...</p>';
      try {
        var res = await fetch('/cep/buscar?cep=' + cep + '&raioKm=' + raioKm);
        var dados = await res.json();
        if (!res.ok) {
          el.innerHTML = '<p class="erro">Erro ' + res.status + ': ' + (dados.message || JSON.stringify(dados)) + '</p>';
          return;
        }
        var o = dados.origem;
        var itens = dados.resultados.map(function(c) { return '<li>' + c + '</li>'; }).join('');
        el.innerHTML =
          '<p><strong>Origem:</strong> ' + o.cep + ' — ' + o.logradouro + ', ' + o.bairro + ', ' + o.cidade + '/' + o.uf + '</p>' +
          '<p><strong>Total encontrado:</strong> ' + dados.total + '</p>' +
          (dados.total > 0 ? '<ul>' + itens + '</ul>' : '');
      } catch (err) {
        el.innerHTML = '<p class="erro">Erro de conexao: ' + err.message + '</p>';
      }
    });
  </script>
</body>
</html>
